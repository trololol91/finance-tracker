name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write   # create GitHub Release
  packages: write   # push images to GHCR

env:
  REGISTRY: ghcr.io/${{ github.repository_owner }}

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Install dependencies
        run: npm ci

      - name: Build plugin-sdk
        run: npm run build -w packages/plugin-sdk

      - name: Build scraper-cibc
        run: npm run build -w packages/scraper-cibc

      - name: Pack scraper-cibc
        working-directory: packages/scraper-cibc
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          node ../../scripts/pack-plugin.mjs
          mv scraper-cibc-*.zip scraper-cibc-${VERSION}.zip

      - name: Build scraper-td-credit-card
        run: npm run build -w packages/scraper-td-credit-card

      - name: Pack scraper-td-credit-card
        working-directory: packages/scraper-td-credit-card
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          node ../../scripts/pack-plugin.mjs
          mv scraper-td-credit-card-*.zip scraper-td-credit-card-${VERSION}.zip

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/finance-tracker-backend:${{ steps.version.outputs.VERSION }}
            ${{ env.REGISTRY }}/finance-tracker-backend:latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: packages/frontend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/finance-tracker-frontend:${{ steps.version.outputs.VERSION }}
            ${{ env.REGISTRY }}/finance-tracker-frontend:latest

      - name: Patch docker-compose.release.yml
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          sed -i \
            "s|image: .*/finance-tracker-backend:.*|image: $REGISTRY/finance-tracker-backend:$VERSION|" \
            docker-compose.release.yml
          sed -i \
            "s|image: .*/finance-tracker-frontend:.*|image: $REGISTRY/finance-tracker-frontend:$VERSION|" \
            docker-compose.release.yml

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            packages/scraper-cibc/scraper-cibc-${{ steps.version.outputs.VERSION }}.zip
            packages/scraper-td-credit-card/scraper-td-credit-card-${{ steps.version.outputs.VERSION }}.zip
            docker-compose.release.yml
