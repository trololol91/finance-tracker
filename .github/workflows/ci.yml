name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

jobs:
  ci:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package: [backend, frontend, mcp-server]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci

      - name: Build workspace dependencies (backend only)
        if: matrix.package == 'backend'
        run: |
          npm run build -w packages/plugin-sdk
          npm run build -w packages/scraper-stub

      - name: Generate Prisma client (backend only)
        if: matrix.package == 'backend'
        run: npm run prisma:generate -w packages/backend

      - name: Generate API client (frontend only)
        if: matrix.package == 'frontend'
        run: npm run generate:api -w packages/frontend

      - name: Generate API client (mcp-server only)
        if: matrix.package == 'mcp-server'
        run: npm run generate:api -w packages/mcp-server

      - name: Typecheck
        run: npm run typecheck -w packages/${{ matrix.package }}

      - name: Lint
        run: npm run lint:eslint -w packages/${{ matrix.package }}

      - name: Test (coverage)
        run: npm run test:coverage -w packages/${{ matrix.package }}
