name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

jobs:
  ci:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package: [backend, frontend]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck -w packages/${{ matrix.package }}

      - name: Lint
        run: npm run lint:eslint -w packages/${{ matrix.package }}

      - name: Test (coverage)
        run: npm run test:coverage -w packages/${{ matrix.package }}
