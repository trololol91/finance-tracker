server {
    listen 3002;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # React Router: fall back to index.html for all non-file routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache hashed assets indefinitely (Vite adds content hashes to filenames)
    location ~* \.(js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
