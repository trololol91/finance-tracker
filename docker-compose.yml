version: '3.8'

services:
    postgres:
        image: postgres:17-alpine
        container_name: finance-tracker-db
        restart: unless-stopped
        ports:
            - "5432:5432"
        environment:
            POSTGRES_USER: ${POSTGRES_USER}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
            POSTGRES_DB: ${POSTGRES_DB:-finance_tracker}
            PGDATA: /var/lib/postgresql/data/pgdata
        volumes:
            - postgres_data:/var/lib/postgresql/data
            - ./packages/backend/database/init:/docker-entrypoint-initdb.d
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB:-finance_tracker}"]
            interval: 10s
            timeout: 5s
            retries: 5
        networks:
            - nest-network

    playwright-server:
        build:
            context: docker/playwright-server
        container_name: finance-tracker-playwright
        restart: unless-stopped
        healthcheck:
            test: ["CMD", "node", "-e", "require('net').connect({port:3003,host:'localhost'}).on('connect',()=>process.exit(0)).on('error',()=>process.exit(1))"]
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 10s
        networks:
            - nest-network

    backend:
        build:
            context: .
            dockerfile: Dockerfile
        container_name: finance-tracker-backend
        restart: unless-stopped
        ports:
            - "3001:3001"
        environment:
            - NODE_ENV=production
            - PORT=3001
            - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-finance_tracker}?schema=public
            - JWT_SECRET=${JWT_SECRET}
            - CREDENTIALS_ENCRYPTION_KEY=${CREDENTIALS_ENCRYPTION_KEY}
            - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost:3002}
            - SCRAPER_PLUGIN_DIR=/data/scraper-plugins
            - PLAYWRIGHT_SERVER_URL=${PLAYWRIGHT_SERVER_URL:-ws://playwright-server:3003/ws}
            - PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD=1
            - AI_PROVIDER=${AI_PROVIDER:-anthropic}
            - AI_MODEL=${AI_MODEL:-claude-haiku-4-5-20251001}
            - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
            - OPENAI_API_KEY=${OPENAI_API_KEY:-}
            - VAPID_PUBLIC_KEY=${VAPID_PUBLIC_KEY:-}
            - VAPID_PRIVATE_KEY=${VAPID_PRIVATE_KEY:-}
            - VAPID_SUBJECT=${VAPID_SUBJECT:-}
            - SMTP_HOST=${SMTP_HOST:-}
            - SMTP_PORT=${SMTP_PORT:-587}
            - SMTP_USER=${SMTP_USER:-}
            - SMTP_PASS=${SMTP_PASS:-}
        volumes:
            - ./packages/backend/logs:/usr/src/app/packages/backend/logs
            - scraper_plugins:/data/scraper-plugins
        depends_on:
            postgres:
                condition: service_healthy
            playwright-server:
                condition: service_healthy
        command: sh -c "cd packages/backend && npx prisma migrate deploy && exec node /usr/src/app/packages/backend/dist/main.js"
        healthcheck:
            test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/health',(r)=>{process.exit(r.statusCode===200?0:1)}).on('error',()=>process.exit(1))"]
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 40s
        networks:
            - nest-network

    frontend:
        build:
            context: .
            dockerfile: packages/frontend/Dockerfile
        container_name: finance-tracker-frontend
        restart: unless-stopped
        ports:
            - "3002:3002"
        environment:
            - VITE_API_BASE_URL=${VITE_API_BASE_URL:-http://localhost:3001}
            - VITE_VAPID_PUBLIC_KEY=${VAPID_PUBLIC_KEY:-}
        depends_on:
            backend:
                condition: service_healthy
        healthcheck:
            test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:3002 || exit 1"]
            interval: 30s
            timeout: 10s
            retries: 3
        networks:
            - nest-network

volumes:
    postgres_data:
        driver: local
    scraper_plugins:
        driver: local

networks:
    nest-network:
        driver: bridge
