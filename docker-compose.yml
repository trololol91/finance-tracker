version: '3.8'

services:
    postgres:
        image: postgres:17-alpine
        container_name: finance-tracker-db
        restart: unless-stopped
        ports:
            - "5432:5432"
        environment:
            POSTGRES_USER: ${POSTGRES_USER:-finance_user}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-finance_password}
            POSTGRES_DB: ${POSTGRES_DB:-finance_tracker}
            PGDATA: /var/lib/postgresql/data/pgdata
        volumes:
            - postgres_data:/var/lib/postgresql/data
            - ./packages/backend/database/init:/docker-entrypoint-initdb.d
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-finance_user} -d ${POSTGRES_DB:-finance_tracker}"]
            interval: 10s
            timeout: 5s
            retries: 5
        networks:
            - nest-network

    backend:
        build:
            context: ./packages/backend
            dockerfile: Dockerfile
            target: production
        container_name: finance-tracker-backend
        restart: unless-stopped
        ports:
            - "3001:3000"
        environment:
            - NODE_ENV=production
            - LOG_LEVEL=info
            - PORT=3000
            - SECRET_KEY=${SECRET_KEY:-change_this_secret_key}
            - DATABASE_HOST=postgres
            - DATABASE_PORT=5432
            - DATABASE_USER=${POSTGRES_USER:-finance_user}
            - DATABASE_PASSWORD=${POSTGRES_PASSWORD:-finance_password}
            - DATABASE_NAME=${POSTGRES_DB:-finance_tracker}
            - DATABASE_SYNC=false
            - DATABASE_LOGGING=false
        volumes:
            - ./packages/backend/logs:/usr/src/app/logs
        depends_on:
            postgres:
                condition: service_healthy
        healthcheck:
            test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/health || exit 1"]
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 40s
        networks:
            - nest-network

    frontend:
        build:
            context: ./packages/frontend
            dockerfile: Dockerfile
        container_name: finance-tracker-frontend
        restart: unless-stopped
        ports:
            - "3002:3002"
        environment:
            - NODE_ENV=production
            - VITE_API_URL=http://backend:3000
        depends_on:
            backend:
                condition: service_healthy
        healthcheck:
            test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3002 || exit 1"]
            interval: 30s
            timeout: 10s
            retries: 3
        networks:
            - nest-network

volumes:
    postgres_data:
        driver: local

networks:
    nest-network:
        driver: bridge
